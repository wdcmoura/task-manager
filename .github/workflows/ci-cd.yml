name: CI/CD Flask Docker

on:
  push:
    branches:
      - main
      - develop
      - staging

  pull_request:
    branches:
      - main

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: |
          pip install Flask==1.1.4
          pip install Flask-Bcrypt==0.7.1
          pip install Flask-Login==0.5.0
          pip install Flask-SQLAlchemy==2.4.1
          pip install Flask-WTF==0.14.3
          pip install WTForms==2.2.1
          pip install SQLAlchemy==1.3.24
          pip install Werkzeug==1.0.1
          pip install Jinja2==2.11.3
          pip install MarkupSafe==2.0.1
          pip install itsdangerous==1.1.0
          pip install click==7.1.2

      - name: Validar sintaxe Python
        run: |
          python -m py_compile todo_project/run.py

      - name: Build Docker
        run: |
          docker build -t task-manager .
