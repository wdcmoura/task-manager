name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - dev
      - stage
  pull_request:
    branches:
      - main
      - stage

jobs:
  test:
    name: Automated Tests (Unit / Integration / Functional)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: todo_project
        env:
          SECRET_KEY: test-secret-key
          SQLALCHEMY_DATABASE_URI: "sqlite:///:memory:"
        run: |
          pytest tests/ -v \
            --cov=todo_project \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: todo_project/coverage.xml

  build:
    name: Build and Validate Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t task-manager-flask:ci .

      - name: Run container
        run: |
          docker run -d --name task-manager-test \
            -e SECRET_KEY=ci-secret-key \
            -e "SQLALCHEMY_DATABASE_URI=sqlite:///site.db" \
            -p 8080:5000 task-manager-flask:ci
          sleep 5

      - name: Check running container
        run: docker ps

      - name: Validate application response
        run: curl -I http://localhost:8080 || exit 1

      - name: Show container logs
        if: always()
        run: docker logs task-manager-test || true

  sast:
    name: Static Security Analysis with Bandit
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST
        run: |
          bandit -r todo_project \
            --exclude todo_project/tests \
            -f txt -o bandit-report.txt || true
          cat bandit-report.txt

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt

  dependency_audit:
    name: Dependency Vulnerability Analysis with pip-audit
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run dependency audit
        run: |
          pip-audit -r requirements.txt -f json -o pip-audit-report.json || true
          pip-audit -r requirements.txt || true

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  dast:
    name: Dynamic Security Analysis (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and start application container
        run: |
          docker build -t task-manager-flask:ci .
          docker run -d --name task-manager-dast \
            -e SECRET_KEY=ci-secret-key \
            -e "SQLALCHEMY_DATABASE_URI=sqlite:///site.db" \
            -p 5000:5000 task-manager-flask:ci

      - name: Wait for application to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:5000 && echo "App ready" && break || sleep 3
          done

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:5000'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-report
          cmd_options: '-I'

      - name: Stop application container
        if: always()
        run: docker stop task-manager-dast || true

  stage_deploy:
    name: Continuous Delivery - Stage Environment
    runs-on: ubuntu-latest
    needs:
      - build
      - sast
      - dependency_audit
      - dast
    if: github.ref == 'refs/heads/stage' || github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build stage image
        run: docker build -t task-manager-flask:stage .

      - name: Deploy application in stage environment
        run: |
          docker run -d --name task-manager-stage \
            -e SECRET_KEY=ci-secret-key \
            -e "SQLALCHEMY_DATABASE_URI=sqlite:///site.db" \
            -p 8080:5000 task-manager-flask:stage
          docker ps

      - name: Wait for stage environment to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080 && echo "Stage ready" && break || sleep 3
          done

      - name: Validate stage environment
        run: curl -I http://localhost:8080 || exit 1

      - name: Run DAST against stage environment (OWASP ZAP)
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8080'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-stage-report
          cmd_options: '-I'

      - name: Stop stage environment
        if: always()
        run: docker rm -f task-manager-stage || true

  monitoring:
    name: Post-Deploy Monitoring Stack Validation
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start monitoring stack with Docker Compose
        run: |
          cp .env.example .env 2>/dev/null || echo "SECRET_KEY=ci-secret-key" > .env
          echo "SQLALCHEMY_DATABASE_URI=sqlite:///site.db" >> .env
          docker compose up -d --build
          sleep 15

      - name: Validate Flask app is running
        run: curl -sf http://localhost:5000 || exit 1

      - name: Validate /metrics endpoint is exposed
        run: |
          curl -sf http://localhost:5000/metrics | grep -q 'flask_http_request_total' \
            && echo "Metrics endpoint OK" || exit 1

      - name: Validate Prometheus is running
        run: curl -sf http://localhost:9090/-/healthy || exit 1

      - name: Validate Grafana is running
        run: curl -sf http://localhost:3000/api/health || exit 1

      - name: Check Prometheus is scraping Flask metrics
        run: |
          sleep 10
          curl -sf "http://localhost:9090/api/v1/targets" \
            | grep -q '"health":"up"' \
            && echo "Prometheus scraping OK" || echo "Warning: target may not be up yet"

      - name: Tear down monitoring stack
        if: always()
        run: docker compose down -v
