name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - dev
      - stage
  pull_request:
    branches:
      - main
      - stage


jobs:
  test:
    name: Automated Tests (Unit / Integration / Functional)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Debug repository structure
        run: |
          pwd
          ls -la
          find . -type f | sort

      - name: Run tests with coverage
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
          SECRET_KEY: test-secret-key
          SQLALCHEMY_DATABASE_URI: "sqlite:///:memory:"
        run: |
          pytest todo_project -v \
            --cov=todo_project \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  build:
    name: Build and Validate Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t task-manager-flask:ci .

      - name: Run container
        run: |
          docker run -d --name task-manager-test \
            -e SECRET_KEY=ci-secret-key \
            -e "SQLALCHEMY_DATABASE_URI=sqlite:///site.db" \
            -p 8080:5000 task-manager-flask:ci
          sleep 5

      - name: Validate application response
        run: curl -I http://localhost:8080 || exit 1

      - name: Show container logs
        if: always()
        run: docker logs task-manager-test || true


  sast:
    name: Static Security Analysis with Bandit
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install bandit

      - run: |
          bandit -r todo_project \
            --exclude todo_project/tests \
            -f txt -o bandit-report.txt || true

      - uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt


  dependency_audit:
    name: Dependency Vulnerability Analysis with pip-audit
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pip-audit

      - run: |
          pip-audit -r requirements.txt -f json -o pip-audit-report.json || true
          pip-audit -r requirements.txt || true

      - uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json


  dast:
    name: Dynamic Security Analysis (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build and run app
        run: |
          docker build -t task-manager-flask:ci .
          docker run -d --name task-manager-dast \
            -e SECRET_KEY=ci-secret-key \
            -p 5000:5000 task-manager-flask:ci

      - name: Wait for app
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:5000 && break || sleep 3
          done

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:5000'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-report
          cmd_options: '-I'

      - name: Stop container
        if: always()
        run: docker stop task-manager-dast || true


  stage_deploy:
    name: Continuous Delivery - Stage Environment
    runs-on: ubuntu-latest
    needs: [build, sast, dependency_audit, dast]
    if: github.ref == 'refs/heads/stage' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t task-manager-flask:stage .

      - run: |
          docker run -d --name task-manager-stage \
            -e SECRET_KEY=ci-secret-key \
            -p 8080:5000 task-manager-flask:stage

      - run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080 && break || sleep 3
          done

      - run: curl -I http://localhost:8080

      - run: docker rm -f task-manager-stage || true


  monitoring:
    name: Post-Deploy Monitoring Stack Validation
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - run: |
          cp .env.example .env 2>/dev/null || echo "SECRET_KEY=ci-secret-key" > .env
          echo "SQLALCHEMY_DATABASE_URI=sqlite:///site.db" >> .env
          docker compose up -d --build
          sleep 15

      - run: curl -sf http://localhost:5000 || exit 1
      - run: curl -sf http://localhost:9090/-/healthy || exit 1
      - run: curl -sf http://localhost:3000/api/health || exit 1

      - run: docker compose down -v
